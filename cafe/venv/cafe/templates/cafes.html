{% block content %}
{% include "base.html" %}
<div class="table">
    <table class="table caption-top">
        <caption><a href="{{url_for('home')}}"> Home </a></caption>
        <thead>
          <tr>
            <th scope="col">#</th>
            <th scope="col"> Coffee Name</th>
            <th scope="col"> Location </th>
            <th scope="col"> Availability </th>
          </tr>
        </thead>
        <tbody>
          {% for cafe in cafes %}
          <tr>
            <th scope="row">1</th>
            <td> {{cafe.CoffeeName}} </td>
            <td>{{cafe.Location}}</td>
            <td>{{cafe.Availability_details}}</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
</div>
{% include "footer.html" %}
{% endblock %}
